# 后端配置
backend:
  name: github
  repo: I8Zoro8I/zoro_blog
  branch: main
  # 这里的 Worker 地址配置看起来没问题
  base_url: https://snowy-frost-15b9.m15860860386.workers.dev
  auth_endpoint: auth

# 媒体文件
media_folder: "docs/public/images"
public_folder: "/images"

# 内容集合
collections:
  - name: "column"
    label: "内容管理"
    folder: "docs/column"
    create: true
    path: "{{new_folder}}/{{slug}}"
    slug: "{{slug}}"
    fields:
      - label: "所属分类 (文件夹名)"
        name: "new_folder"
        widget: "string"
        default: "Algorithm"
        hint: "【当前已有分类】: Algorithm, Travel, Growing, fanLink"
      - label: "文章标题 (侧边栏显示)"
        name: "title"
        widget: "string"
      - label: "文件名 (URL路径)"
        name: "slug"
        widget: "string"
        hint: "仅限英文、数字、下划线，例如: 005_BinaryTree"
      - { label: "日期", name: "date", widget: "datetime" }
      - { label: "内容", name: "body", widget: "markdown" }

  - name: "settings"
    label: "系统设置"
    delete: false
    files:
      - name: "categories_config"
        label: "全站分类管理"
        file: "docs/.vitepress/relaConf/categories.json"
        fields:
          - label: "分类列表"
            name: "categories"
            widget: "list"
            fields:
              - label: "分类名称"
                name: "name"
                widget: "string"
              - label: "分类标识 (路径用)"
                name: "id"
                widget: "string"
              - label: "图标"
                name: "icon"
                widget: "string"
              - label: "二级分组" # --- 修复对齐 ---
                name: "children"
                widget: "list"
                fields:
                  - label: "分组名称"
                    name: "name"
                    widget: "string"
                  - label: "三级文章列表"
                    name: "links"
                    widget: "list"
                    fields:
                      - label: "文章标题"
                        name: "title"
                        widget: "string"
                      - label: "文章路径"
                        name: "url"
                        widget: "string"