<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager</title>
    <!-- 引入 Netlify Identity 挂件 -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
<script>
    // 【关键步骤】手动指定你的 Netlify 站点 API 地址
    // 这里的 URL 请替换为你 Netlify 后台显示的真实二级域名 (例如 netzoroblog.netlify.app)
    const NETLIFY_SITE_URL = "https://netzoroblog.netlify.app";

    if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
            if (!user) {
                window.netlifyIdentity.on("login", () => {
                    document.location.href = "/admin/";
                });
            }
        });
        // 强制告知 CMS 身份验证服务的地址
        window.localStorage.setItem("netlifySiteURL", NETLIFY_SITE_URL);
    }
</script>

<!-- Decap CMS 主程序 -->
<script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
