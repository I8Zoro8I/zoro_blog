backend:
  name: github
  repo: I8Zoro8I/zoro_blog
  branch: main

media_folder: "docs/public/images"
public_folder: "/images"

collections:
  - name: "posts"
    label: "文章"
    folder: "docs/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "日期", name: "date", widget: "datetime" }
      - { label: "内容", name: "body", widget: "markdown" }