# 后端配置
backend:
  name: git-gateway
  repo: I8Zoro8I/zoro_blog  # 你的 用户名/仓库名
  branch: main             # 确认你的分支是 main

# 媒体文件
media_folder: "docs/public/images"
public_folder: "/images"

# 内容集合
collections:
  - name: "column"
    label: "内容管理"
    folder: "docs/column"
    create: true
    path: "{{new_folder}}/{{slug}}"
    slug: "{{slug}}"
    fields:
      - label: "所属分类 (文件夹名)"
        name: "new_folder"
        widget: "string"
        default: "Algorithm"
        hint: "【当前已有分类】: Algorithm, Travel, Growing, fanLink"
      - label: "文章标题 (侧边栏显示)"
        name: "title"
        widget: "string"
      - label: "文件名 (URL路径)"
        name: "slug"
        widget: "string"
        hint: "仅限英文、数字、下划线，例如: 005_BinaryTree"
      - { label: "日期", name: "date", widget: "datetime" }
      - { label: "内容", name: "body", widget: "markdown" }

  # --- 修复后的 settings 部分 ---
  - name: "settings"
    label: "系统设置"
    delete: false
    files:
      - name: "sidebar_config"
        label: "侧边栏分类结构"
        file: "docs/.vitepress/relaConf/cate.json"
        fields:
          - label: "分类列表"
            name: "categories"
            widget: "list"
            fields:
              - { label: "分类标识 (如: Algorithm)", name: "id", widget: "string" }
              - { label: "分类中文名", name: "title", widget: "string" }
              - label: "分组内容"
                name: "groups"
                widget: "list"
                fields:
                  - { label: "分组名称 (如: 数据结构)", name: "groupName", widget: "string" }
                  - label: "文章列表"
                    name: "items"
                    widget: "list"
                    fields:
                      - { label: "侧边栏显示文本", name: "text", widget: "string" }
                      - { label: "文件路径 (不带.md)", name: "link", widget: "string", hint: "例如: /column/Algorithm/001_Stack" }